name: CI and Deploy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID || 'test-project' }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://test.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY || 'test-anon-key' }}
      VITE_APP_BASE_URL: ${{ vars.VITE_APP_BASE_URL || 'http://localhost:5173' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Deno check Edge Functions
        run: deno check supabase/functions/*/index.ts

      - name: Verify no legacy platform references
        run: |
          legacy_pattern="$(node <<'NODE'
          const escape = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const terms = [
            "LOVABLE_API" + "_KEY",
            "ai.gateway." + "lovable" + "." + "dev",
            "@" + "lovable" + "." + "dev",
            "rechtsassistent." + "lovable" + "." + "app",
            "lovable" + "." + "app",
            "lovable" + "project" + "." + "com",
            "lovable" + "-" + "tagger",
          ];
          console.log(terms.map(escape).join("|"));
          NODE
          )"
          secret_pattern="$(node <<'NODE'
          const escape = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const terms = ["sk" + "-or-v1", "TEST_OPENROUTER" + "_API_KEY"];
          console.log(terms.map(escape).join("|"));
          NODE
          )"
          ! rg -n "$legacy_pattern" . --glob '!node_modules/**' --glob '!dist/**'
          ! rg -n "$secret_pattern" . --glob '!node_modules/**' --glob '!dist/**'

  deploy-supabase:
    name: Deploy Supabase
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}
      CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate deployment config
        id: config
        run: |
          missing=()
          [ -n "$SUPABASE_ACCESS_TOKEN" ] || missing+=("SUPABASE_ACCESS_TOKEN secret")
          [ -n "$SUPABASE_PROJECT_REF" ] || missing+=("SUPABASE_PROJECT_REF secret")
          [ -n "$SUPABASE_DB_PASSWORD" ] || missing+=("SUPABASE_DB_PASSWORD secret")
          [ -n "$OPENROUTER_API_KEY" ] || missing+=("OPENROUTER_API_KEY secret")
          [ -n "$FIRECRAWL_API_KEY" ] || missing+=("FIRECRAWL_API_KEY secret")
          [ -n "$APP_BASE_URL" ] || missing+=("APP_BASE_URL repository variable")
          [ -n "$CORS_ALLOWED_ORIGINS" ] || missing+=("CORS_ALLOWED_ORIGINS repository variable")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::warning::Skipping Supabase deploy; missing %s\n' "${missing[*]}"
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "can_deploy=true" >> "$GITHUB_OUTPUT"

      - name: Link project
        if: steps.config.outputs.can_deploy == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        if: steps.config.outputs.can_deploy == 'true'
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Set Edge Function secrets
        if: steps.config.outputs.can_deploy == 'true'
        run: |
          supabase secrets set \
            OPENROUTER_API_KEY="$OPENROUTER_API_KEY" \
            OPENROUTER_MODEL_HIGH_QUALITY="openai/gpt-5.5" \
            OPENROUTER_EMBEDDING_MODEL="openai/text-embedding-3-small" \
            FIRECRAWL_API_KEY="$FIRECRAWL_API_KEY" \
            APP_BASE_URL="$APP_BASE_URL" \
            CORS_ALLOWED_ORIGINS="$CORS_ALLOWED_ORIGINS" \
            --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy Edge Functions
        if: steps.config.outputs.can_deploy == 'true'
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"

  deploy-vercel:
    name: Deploy Vercel
    runs-on: ubuntu-latest
    needs: deploy-supabase
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Vercel config
        id: config
        run: |
          missing=()
          [ -n "$VERCEL_ORG_ID" ] || missing+=("VERCEL_ORG_ID secret")
          [ -n "$VERCEL_PROJECT_ID" ] || missing+=("VERCEL_PROJECT_ID secret")
          [ -n "${{ secrets.VERCEL_TOKEN }}" ] || missing+=("VERCEL_TOKEN secret")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::warning::Skipping Vercel deploy; missing %s\n' "${missing[*]}"
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "can_deploy=true" >> "$GITHUB_OUTPUT"

      - name: Pull Vercel environment
        if: steps.config.outputs.can_deploy == 'true'
        run: npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build with Vercel
        if: steps.config.outputs.can_deploy == 'true'
        run: npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel
        if: steps.config.outputs.can_deploy == 'true'
        run: npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
